<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="min-h-screen bg-[#FDFBF9]">

    <div class="flex min-h-screen">

        <!-- Vídeo -->
        <div class="hidden lg:flex w-1/2 relative">

            <video class="absolute inset-0 w-full h-full object-cover" autoplay muted loop playsinline>

                <source src="assets/videos/inicial2.mp4" type="video/mp4">

            </video>

        </div>

        <!-- Login -->
        <div class="flex w-full lg:w-1/2 justify-center items-center bg-[#FDFBF9]">

            <div class="bg-white rounded-[35px] shadow-2xl p-12 w-[500px]">

                <div class="text-center mb-10">

                    <i class="fa-solid fa-camera text-red-700 text-5xl"></i>

                    <h2 style="font-family:'Allura', cursive;" class="text-6xl text-red-700">

                        Álbum de Fotos

                    </h2>

                    <span class="text-red-700 text-xl">
                        _____ ♡ _____
                    </span>

                    <p class="mt-3 text-gray-500">
                        Nossas melhores lembranças ♡
                    </p>

                </div>

                <!-- Mensagem -->
                <div id="mensagem" class="hidden rounded-lg p-3 mb-4 text-center font-semibold">
                </div>

                <form id="loginForm">

                    <div class="mb-4">

                        <label class="block mb-2 font-semibold">
                            Nome
                        </label>

                        <input id="nome" type="text" placeholder="Digite seu nome" required
                            class="w-full rounded-xl border border-gray-300 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500">

                    </div>

                    <div class="mb-6">

                        <label class="block mb-2 font-semibold">
                            Senha
                        </label>

                        <input id="senha" type="password" placeholder="Digite sua senha" required
                            class="w-full rounded-xl border border-gray-300 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500">

                    </div>

                    <div class="relative">

                        <button id="btnEntrar" type="submit"
                            class="w-full bg-red-700 hover:bg-red-800 duration-300 text-white py-4 rounded-full text-lg">

                            Entrar

                        </button>

                        <div id="heartContainer" class="absolute inset-0 pointer-events-none">
                        </div>

                    </div>

                </form>

                <div style="font-family:'Allura', cursive;" class="text-center mt-8 text-red-700 text-2xl">

                    "O começo da nossa história"

                </div>

            </div>

        </div>

    </div>

    <style>
        @keyframes floatHeart {

            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-150px) scale(2);
                opacity: 0;
            }

        }

        .heart {
            position: absolute;
            color: #dc2626;
            animation: floatHeart 1s ease-out forwards;
            pointer-events: none;
        }
    </style>

    <script>

        const form = document.getElementById("loginForm");
        const mensagem = document.getElementById("mensagem");
        const button = document.getElementById("btnEntrar");
        const container = document.getElementById("heartContainer");

        form.addEventListener("submit", function (e) {

            e.preventDefault();

            // animação dos corações

            for (let i = 0; i < 12; i++) {

                const heart = document.createElement("span");

                heart.innerHTML = "♡";
                heart.className = "heart";

                heart.style.left = Math.random() * 100 + "%";
                heart.style.bottom = "20px";
                heart.style.fontSize = (18 + Math.random() * 15) + "px";

                container.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 1000);

            }

            const nome = document.getElementById("nome").value;
            const senha = document.getElementById("senha").value;

            // LOGIN

            if (nome === "Wesley&Ketelen" && senha === "18/03/2026") {

                mensagem.classList.remove("hidden");
                mensagem.className =
                    "bg-green-100 text-green-700 rounded-lg p-3 mb-4 text-center font-semibold";

                mensagem.innerHTML = "❤️ Login realizado com sucesso!";

                setTimeout(() => {

                    window.location.href = "carta.html";

                }, 1500);

            } else {

                mensagem.classList.remove("hidden");
                mensagem.className =
                    "bg-red-100 text-red-700 rounded-lg p-3 mb-4 text-center font-semibold";

                mensagem.innerHTML = "Nome ou senha incorretos.";

            }

        });

    </script>

</body>

</html>
